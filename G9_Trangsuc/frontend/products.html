<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm - G9 Trang Sức</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div id="navbar"></div>

<section class="product-page-header">
    <div class="container">
        <h1>Danh sách sản phẩm</h1>
        <p>Khám phá các mẫu trang sức sang trọng và tinh tế</p>
    </div>
</section>

<div class="container py-4">

    <div class="product-toolbar mb-4">

        <div class="search-box">
            <input type="text"
                   id="keyword"
                   class="form-control"
                   placeholder="Tìm sản phẩm...">

            <button onclick="searchProduct()" class="btn btn-dark">
                Tìm
            </button>
        </div>

        <div class="dropdown">
            <button class="btn btn-outline-dark dropdown-toggle"
                    type="button"
                    data-bs-toggle="dropdown">
                
            </button>

            <ul class="dropdown-menu" id="category-dropdown"></ul>
        </div>

    </div>

    <div class="row" id="product-list"></div>

    <div class="mt-4 text-center" id="pagination"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/api.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/product.js"></script>
<script src="assets/js/category-menu.js"></script>

</body>
</html>
