<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<div id="header"></div>

<div class="container py-5">

    <h2 class="mb-4">🛒 Giỏ hàng của bạn</h2>

    <div class="card product-card">
        <div class="card-body">

            <table class="table table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Thành tiền</th>
                        <th>Xóa</th>
                    </tr>
                </thead>

                <tbody id="cart-body"></tbody>
            </table>

            <h4 class="text-danger" id="cart-total"></h4>

            <a href="checkout.html" class="btn btn-success mt-3">
                Thanh toán
            </a>

        </div>
    </div>

</div>

<script src="../assets/js/shared/api.js"></script>
<script src="../assets/js/shared/user-header.js"></script>
<script src="../assets/js/user/cart.js"></script>

</body>
</html>
