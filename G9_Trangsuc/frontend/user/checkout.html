<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

<div id="header"></div>

<div class="container py-5">

    <div class="col-md-6 mx-auto">

        <div class="card product-card">
            <div class="card-body p-4">

                <h3 class="mb-4">Thông tin thanh toán</h3>

                <input id="receiver" class="form-control mb-3" placeholder="Tên người nhận">

                <input id="phone" class="form-control mb-3" placeholder="Số điện thoại">

                <input id="address" class="form-control mb-3" placeholder="Địa chỉ giao hàng">

                <select id="paymentMethod" class="form-control mb-3">
                    <option value="COD">Thanh toán khi nhận hàng</option>
                    <option value="Online">Thanh toán online</option>
                </select>

                <button onclick="checkout()" class="btn btn-success w-100">
                    Xác nhận đặt hàng
                </button>

            </div>
        </div>

    </div>

</div>

<script src="../assets/js/shared/api.js"></script>
<script src="../assets/js/shared/user-header.js"></script>
<script src="../assets/js/user/checkout.js"></script>

</body>
</html>
