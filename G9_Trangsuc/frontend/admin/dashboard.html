<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="sidebar"></div>

<div class="admin-content">

    <h2 class="fw-bold">Dashboard thống kê</h2>
    <p class="text-muted mb-4">Tổng quan hoạt động website G9 Trang Sức</p>

    <div class="row g-4 mb-5">

        <div class="col-md-3">
            <a href="products.html" class="text-decoration-none">
                <div class="dashboard-card bg-blue">
                    <p>Sản phẩm</p>
                    <h2 id="product-count">0</h2>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="orders.html" class="text-decoration-none">
                <div class="dashboard-card bg-green">
                    <p>Đơn hàng</p>
                    <h2 id="order-count">0</h2>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="users.html" class="text-decoration-none">
                <div class="dashboard-card bg-yellow">
                    <p>Người dùng</p>
                    <h2 id="user-count">0</h2>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="orders.html" class="text-decoration-none">
                <div class="dashboard-card bg-red">
                    <p>Doanh thu</p>
                    <h2 id="revenue">0</h2>
                </div>
            </a>
        </div>

    </div>

    <div class="card admin-card">
        <div class="card-body">
            <canvas id="chart"></canvas>
        </div>
    </div>

</div>

<script src="../assets/js/shared/api.js"></script>
<script src="../assets/js/shared/admin-sidebar.js"></script>

<script>
    renderAdminSidebar("dashboard");
</script>

<script src="../assets/js/admin/dashboard.js"></script>

</body>
</html>
