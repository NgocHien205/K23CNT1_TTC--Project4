<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">

    <h3>Quản lý danh mục</h3>

    <div class="card shadow-sm mt-4 mb-4">
        <div class="card-body">

            <h5>Thêm danh mục</h5>

            <input id="name" class="form-control mb-3" placeholder="Tên danh mục">
            <input id="description" class="form-control mb-3" placeholder="Mô tả">
            <input id="parentId" type="number" class="form-control mb-3" placeholder="Mã danh mục cha, để trống nếu là danh mục cha">

            <button onclick="createCategory()" class="btn btn-success">
                Thêm danh mục
            </button>

        </div>
    </div>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Mã</th>
                <th>Tên danh mục</th>
                <th>Mô tả</th>
                <th>Danh mục cha</th>
                <th>Trạng thái</th>
                <th>Xóa</th>
            </tr>
        </thead>

        <tbody id="category-body"></tbody>
    </table>

</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/admin-categories.js"></script>

</body>
</html>
