<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="dashboard.html">Admin G9 Trang Sức</a>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 bg-light min-vh-100 p-3">
            <h5>Quản trị</h5>
            <a href="dashboard.html" class="btn btn-outline-dark w-100 mb-2">Dashboard</a>
            <a href="products.html" class="btn btn-dark w-100 mb-2">Sản phẩm</a>
            <a href="categories.html" class="btn btn-outline-dark w-100 mb-2">Danh mục</a>
            <a href="orders.html" class="btn btn-outline-dark w-100 mb-2">Đơn hàng</a>
            <a href="users.html" class="btn btn-outline-dark w-100 mb-2">Người dùng</a>
        </div>

        <!-- CONTENT -->
        <div class="col-md-10 p-4">

            <h2>Quản lý sản phẩm</h2>

            <!-- FORM THÊM SẢN PHẨM -->
            <div class="card p-3 mb-4 shadow-sm">
                <h5>Thêm sản phẩm</h5>

                <form id="productForm">
                    <div class="row">

                        <div class="col-md-4 mb-3">
                            <label>Tên sản phẩm</label>
                            <input type="text" id="name" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Danh mục</label>
                            <select id="categoryId" class="form-select" required></select>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Chất liệu</label>
                            <input type="text" id="material" class="form-control">
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Giá</label>
                            <input type="number" id="price" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Số lượng</label>
                            <input type="number" id="quantity" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label>Tên ảnh</label>
                            <input type="text" id="image" class="form-control" placeholder="ring1.jpg">
                        </div>

                        <div class="col-md-12 mb-3">
                            <label>Mô tả</label>
                            <textarea id="description" class="form-control"></textarea>
                        </div>

                    </div>

                    <button class="btn btn-warning">Thêm sản phẩm</button>
                </form>
            </div>

            <!-- BẢNG SẢN PHẨM -->
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Ảnh</th>
                        <th>Tên</th>
                        <th>Giá</th>
                        <th>SL</th>
                        <th>Danh mục</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="productTable">
                    <tr>
                        <td colspan="8">Đang tải sản phẩm...</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>
</div>

<script src="../assets/js/shared/config.js"></script>
<script src="../assets/js/admin/products.js"></script>

</body>
</html>
