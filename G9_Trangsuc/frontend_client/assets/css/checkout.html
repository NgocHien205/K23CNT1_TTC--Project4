<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
    <h3>Thanh toán</h3>

    <input id="receiver" class="form-control mb-3" placeholder="Tên người nhận">
    <input id="phone" class="form-control mb-3" placeholder="Số điện thoại">
    <input id="address" class="form-control mb-3" placeholder="Địa chỉ giao hàng">

    <select id="paymentMethod" class="form-control mb-3">
        <option value="COD">Thanh toán khi nhận hàng</option>
        <option value="Online">Thanh toán online</option>
    </select>

    <button onclick="checkout()" class="btn btn-success">
        Xác nhận đặt hàng
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/checkout.js"></script>

</body>
</html>
